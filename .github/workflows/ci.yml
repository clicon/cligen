name: CLIgen CI

on:

  push:
    branches:
      - master
      - test-actions
  pull_request:
    branches: [ master ]

jobs:
  ubuntu-build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: install expect
        run: sudo apt install -y expect
      - name: configure
        run: ./configure
      - name: make
        run: make
      - name: make install
        run: sudo make install
      - name: ldconfig
        run: sudo ldconfig
      - name: make test
        run: make test
