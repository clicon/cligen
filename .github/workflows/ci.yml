name: CLIgen CI

on:

  push:
    branches:
      - master
      - test-actions
  pull_request:
    branches: [ master ]

jobs:
  ubuntu-build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: install expect
        run: sudo apt install -y expect
      - name: configure
        run: ./configure
      - name: make
        run: make
      - name: make install
        run: sudo make install
      - name: ldconfig
        run: sudo ldconfig
      - name: make test
        run: make test

  ubuntu-coverage:
    needs: ubuntu-build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: install expect
        run: sudo apt install -y expect
      - name: configure w coverage
        run: ./configure CPPFLAGS="-fprofile-arcs -ftest-coverage -O0" CFLAGS="" LDFLAGS="-fprofile-arcs -lgcov"
      - name: make
        run: make
      - name: make install
        run: sudo make install
      - name: ldconfig
        run: sudo ldconfig
      - name: make test
        run: make test
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354  # v6.0.1
        with:
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
